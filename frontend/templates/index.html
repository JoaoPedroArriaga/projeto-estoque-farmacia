<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque e Farmácia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.02);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
        }
        
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-sucesso {
            background: #d4edda;
            color: #155724;
        }
        
        .status-erro {
            background: #f8d7da;
            color: #721c24;
        }
        
        .tab {
            overflow: hidden;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }
        
        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 16px;
        }
        
        .tab button:hover {
            background-color: #ddd;
        }
        
        .tab button.active {
            background-color: #667eea;
            color: white;
        }
        
        .tabcontent {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Sistema de Estoque e Farmácia</h1>
        
        <div class="grid">
            <!-- Card: Gerar Consulta -->
            <div class="card">
                <h2>📄 Gerar CONSULTA</h2>
                <input type="text" id="consulta_codigo" placeholder="Código Medicamento" value="789123">
                <input type="number" id="consulta_qtd" placeholder="Quantidade" value="2">
                <input type="text" id="consulta_cpf" placeholder="CPF Paciente" value="12345678901">
                <button class="btn" onclick="gerarConsulta()">🚀 Gerar Consulta</button>
            </div>
            
            <!-- Card: Gerar Reserva -->
            <div class="card">
                <h2>🔒 Gerar RESERVA</h2>
                <input type="text" id="reserva_codigo" placeholder="Código Medicamento" value="789123">
                <input type="number" id="reserva_qtd" placeholder="Quantidade" value="2">
                <input type="text" id="reserva_lote" placeholder="Lote" value="LOTE123">
                <input type="text" id="reserva_cpf" placeholder="CPF Paciente" value="12345678901">
                <button class="btn" onclick="gerarReserva()">🔒 Gerar Reserva</button>
            </div>
            
            <!-- Card: Gerar Baixa -->
            <div class="card">
                <h2>✅ Gerar BAIXA</h2>
                <input type="text" id="baixa_codigo" placeholder="Código Medicamento" value="789123">
                <input type="number" id="baixa_qtd" placeholder="Quantidade" value="2">
                <input type="text" id="baixa_lote" placeholder="Lote" value="LOTE123">
                <input type="text" id="baixa_cpf" placeholder="CPF Paciente" value="12345678901">
                <button class="btn btn-success" onclick="gerarBaixa()">✅ Gerar Baixa</button>
            </div>
        </div>
        
        <!-- Card: Fluxo Completo -->
        <div class="card">
            <h2>🎯 Fluxo Completo</h2>
            <p>Gera consulta, reserva e baixa em sequência (um clique!)</p>
            <button class="btn btn-success" onclick="gerarFluxo()">🎬 Executar Fluxo Completo</button>
        </div>
        
        <!-- Tabs -->
        <div class="card">
            <div class="tab">
                <button class="tablinks active" onclick="openTab(event, 'estoque')">📦 Estoque</button>
                <button class="tablinks" onclick="openTab(event, 'consumo')">📊 Consumo</button>
                <button class="tablinks" onclick="openTab(event, 'logs')">📋 Logs</button>
            </div>
            
            <div id="estoque" class="tabcontent" style="display: block;">
                <div id="estoque_content">Carregando...</div>
            </div>
            
            <div id="consumo" class="tabcontent">
                <div id="consumo_content">Carregando...</div>
            </div>
            
            <div id="logs" class="tabcontent">
                <select id="log_tipo" onchange="carregarLogs()">
                    <option value="consultas">Consultas</option>
                    <option value="reservas">Reservas</option>
                    <option value="baixas">Baixas</option>
                </select>
                <div id="logs_content">Carregando...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Funções para gerar arquivos
        async function gerarConsulta() {
            const data = {
                codigo: document.getElementById('consulta_codigo').value,
                quantidade: parseFloat(document.getElementById('consulta_qtd').value),
                cpf: document.getElementById('consulta_cpf').value
            };
            
            const response = await fetch('/api/gerar/consulta', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            alert(`✅ Consulta gerada! Arquivo: ${result.arquivo}`);
            carregarEstoque();
        }
        
        async function gerarReserva() {
            const data = {
                codigo: document.getElementById('reserva_codigo').value,
                quantidade: parseFloat(document.getElementById('reserva_qtd').value),
                lote: document.getElementById('reserva_lote').value,
                cpf: document.getElementById('reserva_cpf').value
            };
            
            const response = await fetch('/api/gerar/reserva', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            alert(`✅ Reserva gerada! Arquivo: ${result.arquivo}`);
            carregarEstoque();
        }
        
        async function gerarBaixa() {
            const data = {
                codigo: document.getElementById('baixa_codigo').value,
                quantidade: parseFloat(document.getElementById('baixa_qtd').value),
                lote: document.getElementById('baixa_lote').value,
                cpf: document.getElementById('baixa_cpf').value
            };
            
            const response = await fetch('/api/gerar/baixa', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            alert(`✅ Baixa gerada! Arquivo: ${result.arquivo}`);
            carregarEstoque();
            carregarConsumo();
        }
        
        async function gerarFluxo() {
            const data = {
                codigo: 789123,
                quantidade: 2,
                lote: 'LOTE123'
            };
            
            const response = await fetch('/api/gerar/fluxo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            alert(`✅ Fluxo completo gerado! O sistema vai processar automaticamente.`);
            setTimeout(() => {
                carregarEstoque();
                carregarConsumo();
            }, 2000);
        }
        
        // Funções para carregar dados
        async function carregarEstoque() {
            document.getElementById('estoque_content').innerHTML = '<div class="loading">Carregando...</div>';
            
            const response = await fetch('/api/estoque');
            const lotes = await response.json();
            
            if (lotes.length === 0) {
                document.getElementById('estoque_content').innerHTML = '<p>Nenhum lote cadastrado</p>';
                return;
            }
            
            let html = '<table><thead><tr><th>Lote</th><th>Medicamento</th><th>Quantidade</th><th>Validade</th><th>Preço</th></tr></thead><tbody>';
            for (const lote of lotes) {
                html += `
                    <tr>
                        <td>${lote.numero_lote}</td>
                        <td>${lote.codigo_medicamento}</td>
                        <td><strong>${lote.quantidade_atual}</strong></td>
                        <td>${lote.data_validade}</td>
                        <td>R$ ${parseFloat(lote.preco_venda).toFixed(2)}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            document.getElementById('estoque_content').innerHTML = html;
        }
        
        async function carregarConsumo() {
            document.getElementById('consumo_content').innerHTML = '<div class="loading">Carregando...</div>';
            
            const response = await fetch('/api/consumo');
            const itens = await response.json();
            
            if (itens.length === 0) {
                document.getElementById('consumo_content').innerHTML = '<p>Nenhum consumo registrado</p>';
                return;
            }
            
            let html = '<table><thead><tr><th>Prescrição</th><th>CPF</th><th>Medicamento</th><th>Qtd</th><th>Total</th><th>Data</th><th>Lote</th></tr></thead><tbody>';
            for (const item of itens) {
                html += `
                    <tr>
                        <td>${item.id_prescricao}</td>
                        <td>${item.cpf_paciente}</td>
                        <td>${item.codigo_medicamento}</td>
                        <td>${item.quantidade}</td>
                        <td><strong>R$ ${parseFloat(item.preco_total).toFixed(2)}</strong></td>
                        <td>${item.data_uso}</td>
                        <td>${item.lote}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            document.getElementById('consumo_content').innerHTML = html;
        }
        
        async function carregarLogs() {
            const tipo = document.getElementById('log_tipo').value;
            document.getElementById('logs_content').innerHTML = '<div class="loading">Carregando...</div>';
            
            const response = await fetch(`/api/logs?tipo=${tipo}`);
            const logs = await response.json();
            
            if (logs.length === 0) {
                document.getElementById('logs_content').innerHTML = '<p>Nenhum log encontrado</p>';
                return;
            }
            
            let html = '<table><thead><tr>';
            if (tipo === 'consultas') {
                html += '<th>ID</th><th>Arquivo</th><th>Prescrição</th><th>Medicamento</th><th>Qtd</th><th>Disponível</th><th>Data</th>';
            } else if (tipo === 'reservas') {
                html += '<th>ID</th><th>Arquivo</th><th>Prescrição</th><th>Medicamento</th><th>Lote</th><th>Status</th>';
            } else {
                html += '<th>ID</th><th>Arquivo</th><th>Prescrição</th><th>Medicamento</th><th>Lote</th><th>Status</th>';
            }
            html += '</tr></thead><tbody>';
            
            for (const log of logs) {
                html += '<tr>';
                if (tipo === 'consultas') {
                    html += `
                        <td>${log.id_log}</td>
                        <td>${log.arquivo_nome}</td>
                        <td>${log.id_prescricao}</td>
                        <td>${log.codigo_medicamento}</td>
                        <td>${log.quantidade}</td>
                        <td><span class="status ${log.disponivel ? 'status-sucesso' : 'status-erro'}">${log.disponivel ? 'SIM' : 'NÃO'}</span></td>
                        <td>${log.data_recebimento}</td>
                    `;
                } else {
                    html += `
                        <td>${log.id_log}</td>
                        <td>${log.arquivo_nome}</td>
                        <td>${log.id_prescricao}</td>
                        <td>${log.codigo_medicamento}</td>
                        <td>${log.lote || '-'}</td>
                        <td><span class="status ${log.status === 'PROCESSADO' ? 'status-sucesso' : 'status-erro'}">${log.status}</span></td>
                    `;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('logs_content').innerHTML = html;
        }
        
        // Tabs
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
            
            if (tabName === 'estoque') carregarEstoque();
            if (tabName === 'consumo') carregarConsumo();
            if (tabName === 'logs') carregarLogs();
        }
        
        // Carregar dados iniciais
        carregarEstoque();
        
        // Atualizar a cada 5 segundos
        setInterval(() => {
            if (document.getElementById('estoque').style.display !== 'none') carregarEstoque();
            if (document.getElementById('consumo').style.display !== 'none') carregarConsumo();
        }, 5000);
    </script>
</body>
</html>
